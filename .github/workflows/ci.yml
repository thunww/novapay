name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKERHUB_USERNAME: giathan

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma clients
        run: |
          cd services/auth-service && npx prisma generate && cd ../..
          cd services/account-service && npx prisma generate && cd ../..
          cd services/transaction-service && npx prisma generate && cd ../..
          cd services/notification-service && npx prisma generate && cd ../..

      - name: Typecheck auth-service
        run: cd services/auth-service && npx tsc --noEmit

      - name: Typecheck account-service
        run: cd services/account-service && npx tsc --noEmit

      - name: Typecheck transaction-service
        run: cd services/transaction-service && npx tsc --noEmit

      - name: Typecheck notification-service
        run: cd services/notification-service && npx tsc --noEmit

  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: typecheck
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push auth-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/auth-service/Dockerfile
          push: true
          tags: giathan/novapay-auth:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push account-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/account-service/Dockerfile
          push: true
          tags: giathan/novapay-account:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push transaction-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/transaction-service/Dockerfile
          push: true
          tags: giathan/novapay-transaction:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push notification-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/notification-service/Dockerfile
          push: true
          tags: giathan/novapay-notification:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: frontend/Dockerfile
          push: true
          tags: giathan/novapay-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

