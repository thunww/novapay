name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    paths:
      - 'services/**'
      - 'frontend/**'
  pull_request:
    branches: [main]
    paths:
      - 'services/**'
      - 'frontend/**'
  workflow_dispatch:
    inputs:
      services:
        description: 'Services to build'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - auth-service
          - account-service
          - transaction-service
          - notification-service
          - frontend

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 541291114358.dkr.ecr.us-east-1.amazonaws.com
  ECR_PREFIX: novapay
  EKS_CLUSTER: novapay

# ============================================================
# Job 1: Detect which services changed
# ============================================================
jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      auth-service:         ${{ steps.filter.outputs.auth-service }}
      account-service:      ${{ steps.filter.outputs.account-service }}
      transaction-service:  ${{ steps.filter.outputs.transaction-service }}
      notification-service: ${{ steps.filter.outputs.notification-service }}
      frontend:             ${{ steps.filter.outputs.frontend }}
      services-list:        ${{ steps.build-list.outputs.services }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect file changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            auth-service:
              - 'services/auth-service/**'
            account-service:
              - 'services/account-service/**'
            transaction-service:
              - 'services/transaction-service/**'
            notification-service:
              - 'services/notification-service/**'
            frontend:
              - 'frontend/**'

      - name: Build services list
        id: build-list
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "services=${{ github.event.inputs.services }}" >> $GITHUB_OUTPUT
            exit 0
          fi

          SERVICES=""
          [ "${{ steps.filter.outputs.auth-service }}"         == "true" ] && SERVICES="$SERVICES,auth-service"
          [ "${{ steps.filter.outputs.account-service }}"      == "true" ] && SERVICES="$SERVICES,account-service"
          [ "${{ steps.filter.outputs.transaction-service }}"  == "true" ] && SERVICES="$SERVICES,transaction-service"
          [ "${{ steps.filter.outputs.notification-service }}" == "true" ] && SERVICES="$SERVICES,notification-service"
          [ "${{ steps.filter.outputs.frontend }}"             == "true" ] && SERVICES="$SERVICES,frontend"

          SERVICES="${SERVICES#,}"
          [ -z "$SERVICES" ] && SERVICES="none"
          echo "services=$SERVICES" >> $GITHUB_OUTPUT

# ============================================================
# Job 2: Typecheck
# ============================================================
  typecheck:
    name: Typecheck (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.services-list != 'none'
    strategy:
      fail-fast: false
      matrix:
        include:
          - { service: auth-service }
          - { service: account-service }
          - { service: transaction-service }
          - { service: notification-service }
    steps:
      - name: Check if should run
        id: should-run
        run: |
          SERVICES="${{ needs.detect-changes.outputs.services-list }}"
          if [ "$SERVICES" == "all" ] || echo "$SERVICES" | grep -q "${{ matrix.service }}"; then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "run=false" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v4
        if: steps.should-run.outputs.run == 'true'

      - uses: actions/setup-node@v4
        if: steps.should-run.outputs.run == 'true'
        with:
          node-version: 20
          cache: npm

      - name: Install & Generate Prisma
        if: steps.should-run.outputs.run == 'true'
        run: |
          npm install
          cd services/${{ matrix.service }} && npx prisma generate

      - name: Typecheck
        if: steps.should-run.outputs.run == 'true'
        run: cd services/${{ matrix.service }} && npx tsc --noEmit

# ============================================================
# Job 3: Build & Push to ECR
# ============================================================
  build-push:
    name: Build & Push ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [detect-changes, typecheck]
    if: |
      always() &&
      needs.detect-changes.outputs.services-list != 'none' &&
      (needs.typecheck.result == 'success' || needs.typecheck.result == 'skipped') &&
      github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        include:
          - { service: auth-service,         dockerfile: services/auth-service/Dockerfile,         context: . }
          - { service: account-service,      dockerfile: services/account-service/Dockerfile,      context: . }
          - { service: transaction-service,  dockerfile: services/transaction-service/Dockerfile,  context: . }
          - { service: notification-service, dockerfile: services/notification-service/Dockerfile, context: . }
          - { service: frontend,             dockerfile: frontend/Dockerfile,                      context: ./frontend }
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Check if should build
        id: should-build
        run: |
          SERVICES="${{ needs.detect-changes.outputs.services-list }}"
          if [ "$SERVICES" == "all" ] || echo "$SERVICES" | grep -q "${{ matrix.service }}"; then
            echo "build=true" >> $GITHUB_OUTPUT
          else
            echo "build=false" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v4
        if: steps.should-build.outputs.build == 'true'

      - name: Configure AWS credentials
        if: steps.should-build.outputs.build == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        if: steps.should-build.outputs.build == 'true'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate image tag
        if: steps.should-build.outputs.build == 'true'
        id: meta
        run: |
          SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "version=$SHA" >> $GITHUB_OUTPUT
          echo "image=${{ env.ECR_REGISTRY }}/${{ env.ECR_PREFIX }}/${{ matrix.service }}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        if: steps.should-build.outputs.build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build & Push
        if: steps.should-build.outputs.build == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        if: steps.should-build.outputs.build == 'true'
        run: |
          echo "✅ Pushed: ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}"

# ============================================================
# Job 4: Deploy to EKS
# ============================================================
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: [detect-changes, build-push]
    if: |
      always() &&
      needs.build-push.result == 'success' &&
      github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER }}

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Get image tag
        id: tag
        run: echo "sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Deploy with Helm
        run: |
          helm upgrade novapay helm/novapay \
            -f helm/novapay/values-aws.yaml \
            --namespace novapay \
            --set services.auth.tag=${{ steps.tag.outputs.sha }} \
            --set services.account.tag=${{ steps.tag.outputs.sha }} \
            --set services.transaction.tag=${{ steps.tag.outputs.sha }} \
            --set services.notification.tag=${{ steps.tag.outputs.sha }} \
            --set frontend.tag=${{ steps.tag.outputs.sha }} \
            --wait \
            --timeout 5m

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/auth-service -n novapay
          kubectl rollout status deployment/account-service -n novapay
          kubectl rollout status deployment/transaction-service -n novapay
          kubectl rollout status deployment/notification-service -n novapay
          kubectl rollout status deployment/frontend -n novapay
          echo "✅ All services deployed successfully!"

# ============================================================
# Job 5: Summary
# ============================================================
  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [detect-changes, typecheck, build-push, deploy]
    if: always()
    steps:
      - name: Write summary
        run: |
          echo "## 🚀 NovaPay CI/CD Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Services:** \`${{ needs.detect-changes.outputs.services-list }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage      | Result                          |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|---------------------------------|" >> $GITHUB_STEP_SUMMARY
          echo "| Typecheck  | ${{ needs.typecheck.result }}   |" >> $GITHUB_STEP_SUMMARY
          echo "| Build/Push | ${{ needs.build-push.result }}  |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy     | ${{ needs.deploy.result }}      |" >> $GITHUB_STEP_SUMMARY
