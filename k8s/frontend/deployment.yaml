apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: novapay
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: giathan/novapay-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
