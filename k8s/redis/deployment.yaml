apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: novapay
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command: ["redis-server", "--requirepass", "redis_secret", "--appendonly", "yes"]
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "-a", "redis_secret", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
